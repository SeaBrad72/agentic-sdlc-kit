# GitLab CI reference — TypeScript/Node profile.
# Expresses the SAME contract as profiles/typescript-node/ci.yml (GitHub Actions): the 8
# standardized gate-ids of DEVELOPMENT-STANDARDS.md §14, here as GitLab CI JOB KEYS named
# `gate-<x>`. `conformance/ci-gates.sh` recognizes these job keys; the contract is the
# gate-ids, the platform is open. See docs/operations/ci-platforms.md.
#
# Drop in as `.gitlab-ci.yml` at your repo root (incept.sh --ci gitlab does this).
# Tool choices mirror the GitHub profile (pnpm + eslint + tsc + vitest + gitleaks + syft).
# Where GitLab ships a native control, the comment names it — prefer it at scale.

stages: [setup, verify, supply-chain]

default:
  image: node:20-bookworm
  cache:
    key:
      files: [pnpm-lock.yaml]
    paths: [.pnpm-store]

# Setup is not a gate (matches the GitHub profile's gate-install being setup, not a gate).
gate-install:
  stage: setup
  script:
    - corepack enable
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
  artifacts:
    paths: [node_modules/]
    expire_in: 1h

gate-lint:
  stage: verify
  needs: [gate-install]
  script: [pnpm run lint]

gate-type-check:
  stage: verify
  needs: [gate-install]
  script: [pnpm run type-check]

gate-test:
  stage: verify
  needs: [gate-install]
  script: [pnpm run test -- --coverage]
  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'

gate-build:
  stage: verify
  needs: [gate-install]
  script: [pnpm run build]

# Secret scan — gitleaks. GitLab-native alternative: include the Secret-Detection template
#   ( - template: Security/Secret-Detection.gitlab-ci.yml ) and name the job gate-secret-scan.
gate-secret-scan:
  stage: verify
  needs: []
  script:
    - 'command -v gitleaks >/dev/null || (curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_linux_x64.tar.gz | tar -xz -C /usr/local/bin gitleaks)'
    - gitleaks detect --no-banner --redact

# Dependency vulnerability scan. GitLab-native alternative: the Dependency-Scanning template.
gate-dep-scan:
  stage: verify
  needs: [gate-install]
  script: [pnpm audit --audit-level=high]

# SBOM (CycloneDX). GitLab-native alternative: the CycloneDX/Dependency-Scanning artifact.
gate-sbom:
  stage: supply-chain
  needs: [gate-build]
  script:
    - 'command -v syft >/dev/null || curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin'
    - syft dir:. -o cyclonedx-json=sbom.cdx.json
  artifacts:
    paths: [sbom.cdx.json]
    expire_in: 30 days

# Build provenance / attestation. GitLab equivalent: SLSA provenance via the build job's
# artifacts:metadata + a signed attestation (cosign). On GitLab.com, prefer the built-in
# artifact attestation; self-managed runners need cosign keyless (OIDC) wired to your IdP.
gate-provenance:
  stage: supply-chain
  needs: [gate-build, gate-sbom]
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  script:
    - 'command -v cosign >/dev/null || (curl -sSfL -o /usr/local/bin/cosign https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 && chmod +x /usr/local/bin/cosign)'
    - cosign attest-blob --yes --predicate sbom.cdx.json --bundle provenance.bundle dist/ || echo "wire cosign keyless (OIDC) to your runner's IdP — see docs/operations/ci-platforms.md"
  artifacts:
    paths: [provenance.bundle]
    expire_in: 30 days
